name: bug_report
description: Report a bug or unexpected behavior in PolyLance
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below so we can investigate quickly.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I call X function, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the issue.
      placeholder: |
        1. Connect wallet to Polygon Amoy
        2. Navigate to Jobs
        3. Click 'Apply'
        4. Transaction fails with error '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages, transaction hashes, or console output.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      options:
        - Smart Contract (FreelanceEscrow)
        - Smart Contract (YieldManager)
        - Smart Contract (FreelancerReputation)
        - Smart Contract (FreelanceGovernance)
        - Smart Contract (Other)
        - Frontend (UI)
        - Frontend (Wallet Connection)
        - Frontend (Gasless / Biconomy)
        - The Graph (Subgraph)
        - Other
    validations:
      required: true

  - type: input
    id: network
    attributes:
      label: Network
      placeholder: "Polygon Amoy (chain ID 80002)"
    validations:
      required: true

  - type: input
    id: wallet
    attributes:
      label: Wallet / Browser
      placeholder: "MetaMask 12.x, Chrome 124"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Transaction hash, contract address, screenshots, or logs.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I am not reporting a security vulnerability (use security@polylance.codes for that).
          required: true
