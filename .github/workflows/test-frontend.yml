name: Frontend CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1
      - name: Setup Node.js
        uses: actions/setup-node@v4.0.2
        with:
          node-version: '22'
      - name: Install dependencies
        run: |
          cd frontend
          npm install --no-package-lock --legacy-peer-deps
      - name: Run Frontend Tests
        run: |
          cd frontend
          npm test -- --run
