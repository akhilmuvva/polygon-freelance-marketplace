name: Contracts CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1
      - name: Setup Node.js
        uses: actions/setup-node@v4.0.2
        with:
          node-version: '22'
      - name: Sovereign Dependency Purge
        run: |
          cd contracts
          # AGA: Purging local Windows-ARM64 architecture ghosts from the metadata
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps --no-optional
      - name: Actuate Hardhat Tests
        run: |
          cd contracts
          # AGA: Mandatory OpenSSL override for Node 22 + Hardhat EVM stability
          export NODE_OPTIONS=--openssl-legacy-provider
          npx hardhat test
