name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    name: Vercel Preview Deployment
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_CHAIN_ID: "80002"
          VITE_ESCROW_ADDRESS: "0x25F6C8ed995C811E6c0ADb1D66A60830E8115e9A"
          VITE_REPUTATION_ADDRESS: "0x89791A9A3210667c828492DB98DCa3e2076cc373"
          VITE_POLY_TOKEN_ADDRESS: "0xd3b893cd083f07Fe371c1a87393576e7B01C52C6"
          VITE_SBT_ADDRESS: "0xb4e9A5BC64DC07f890367F72941403EEd7faDCbB"
          VITE_GRAPH_URL: "https://api.studio.thegraph.com/query/poly-lance-studio/poly-lance/v0.0.1"

      - name: Deploy Project Artifacts to Vercel
        id: deploy
        run: echo "url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})" >> $GITHUB_OUTPUT

      - name: Comment Preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 🔍 Preview Deployment\n\n**URL:** ${{ steps.deploy.outputs.url }}\n\nDeployed from commit \`${{ github.sha }}\`.`
            })
