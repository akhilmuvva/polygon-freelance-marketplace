name: PolyLance CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: |
          cd contracts
          npm ci || npm install --legacy-peer-deps
      - name: Run Sanity Test
        run: cd contracts && npx hardhat test test/Barebones.test.js
      - name: Run Full Contract Tests
        env:
          CI: true
        run: cd contracts && npx hardhat test --network hardhat

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: |
          cd frontend
          rm -f package-lock.json
          npm install --legacy-peer-deps
      - name: Run Frontend Tests
        env:
          CI: true
        run: cd frontend && npm test -- --pool-options.threads.singleThread
