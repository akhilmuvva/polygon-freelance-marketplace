name: PolyLance CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1
      - name: Setup Node.js
        uses: actions/setup-node@v4.0.2
        with:
          node-version: '22'
      - name: Install Dependencies
        run: |
          cd contracts
          # AGA: Purging local Windows-ARM64 gravity from the metadata
          rm -f package-lock.json 
          npm install --omit=optional --legacy-peer-deps
      - name: Run Sanity Test
        run: cd contracts && npx hardhat test test/Barebones.test.js
      - name: Run Full Contract Tests
        env:
          CI: true
          NODE_OPTIONS: --openssl-legacy-provider
        run: cd contracts && npx hardhat test --network hardhat

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1
      - name: Setup Node.js
        uses: actions/setup-node@v4.0.2
        with:
          node-version: '22'
      - name: Install Dependencies
        run: |
          cd frontend
          rm -f package-lock.json
          npm install --legacy-peer-deps
      - name: Run Frontend Tests
        env:
          CI: true
        run: cd frontend && npm test -- --run
