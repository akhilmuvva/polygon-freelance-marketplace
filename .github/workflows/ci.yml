name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-contracts:
    name: Solidity Lint (Solhint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: contracts/package-lock.json

      - name: Install contract dependencies
        run: cd contracts && npm ci

      - name: Run Solhint
        run: cd contracts && npx solhint 'contracts/**/*.sol' --max-warnings 0

  test-contracts:
    name: Smart Contract Tests (Hardhat)
    runs-on: ubuntu-latest
    needs: lint-contracts
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: contracts/package-lock.json

      - name: Install contract dependencies
        run: cd contracts && npm ci

      - name: Compile contracts
        run: cd contracts && npx hardhat compile

      - name: Run tests
        run: cd contracts && npx hardhat test
        env:
          REPORT_GAS: true

  lint-frontend:
    name: Frontend Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run ESLint
        run: cd frontend && npm run lint

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build production bundle
        run: cd frontend && npm run build
        env:
          VITE_CHAIN_ID: "80002"
          VITE_ESCROW_ADDRESS: "0x25F6C8ed995C811E6c0ADb1D66A60830E8115e9A"
          VITE_REPUTATION_ADDRESS: "0x89791A9A3210667c828492DB98DCa3e2076cc373"
          VITE_POLY_TOKEN_ADDRESS: "0xd3b893cd083f07Fe371c1a87393576e7B01C52C6"
          VITE_SBT_ADDRESS: "0xb4e9A5BC64DC07f890367F72941403EEd7faDCbB"
          VITE_GRAPH_URL: "https://api.studio.thegraph.com/query/poly-lance-studio/poly-lance/v0.0.1"
