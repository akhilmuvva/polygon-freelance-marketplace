type Freelancer @entity {
  id: ID! # address
  totalStars: BigInt!
  totalJobsReviewed: BigInt!
  averageRating: Int!
  portfolioCID: String
  tbaAddress: Bytes # ERC-6551 Token Bound Account
  jobs: [Job!]! @derivedFrom(field: "freelancerLookup")
  reviews: [Review!]! @derivedFrom(field: "freelancer")
}

type Job @entity {
  id: ID!
  jobId: BigInt!
  client: Bytes! # address
  freelancer: Bytes! # address (old field, keeping for compatibility or removing if safe)
  freelancerLookup: Freelancer # new relation
  token: Bytes! # address
  amount: BigInt!
  freelancerStake: BigInt!
  totalPaidOut: BigInt!
  status: JobStatus!
  ipfsHash: String!
  paid: Boolean!
  deadline: BigInt!
  milestoneCount: Int!
  categoryId: Int!
  rating: Int
  createdAt: BigInt!
  updatedAt: BigInt!
  transactions: [Transaction!]! @derivedFrom(field: "job")
  milestones: [Milestone!]! @derivedFrom(field: "job")
  applications: [Application!]! @derivedFrom(field: "job")
  review: Review @derivedFrom(field: "job")
}

enum JobStatus {
  Created
  Accepted
  Ongoing
  Disputed
  Arbitration
  Completed
  Cancelled
}

type Milestone @entity {
  id: ID! # jobId-milestoneId
  job: Job!
  milestoneId: BigInt!
  amount: BigInt!
  ipfsHash: String!
  isReleased: Boolean!
}

type Application @entity {
  id: ID! # jobId-freelancer
  job: Job!
  freelancer: Freelancer!
  stake: BigInt!
  createdAt: BigInt!
}

type Review @entity {
  id: ID! # jobId
  job: Job!
  reviewer: Bytes!
  freelancer: Freelancer!
  rating: Int!
  ipfsHash: String!
  createdAt: BigInt!
}

type Transaction @entity {
  id: ID! # txHash
  job: Job!
  from: Bytes!
  to: Bytes
  amount: BigInt
  event: String!
  timestamp: BigInt!
  blockNumber: BigInt!
}

type Evidence @entity {
  id: ID! # txHash
  job: Job!
  submitter: Bytes!
  evidenceHash: String!
  timestamp: BigInt!
}

type GlobalStat @entity {
  id: ID! # "1"
  totalJobs: BigInt!
  totalVolume: BigInt!
  activeUsers: [Bytes!]!
}
type DisputeMapping @entity {
  id: ID! # disputeId
  jobId: BigInt!
}

type IntentMatch @entity {
  id: ID! # jobId
  client: Bytes!
  freelancer: Bytes!
  intentHash: Bytes!
  timestamp: BigInt!
}

type YieldDistribution @entity {
  id: ID! # txHash
  user: Bytes!
  amount: BigInt!
  timestamp: BigInt!
}

type ProtocolStats @entity {
  id: ID! # "1"
  totalYieldGenerated: BigInt!
  totalValueLocked: BigInt!
  totalOriginatorFees: BigInt!  # Tracks cumulative 0.5% invoice fees
  totalSovereignSurplus: BigInt! # Tracks cumulative 20% yield capture
  totalEliteIntents: BigInt!    # Tracks elite-tier matching events
}

# Revenue Protocol Alpha: Tracks every tokenized invoice event
type InvoiceEvent @entity {
  id: ID!           # txHash-logIndex
  invoiceId: BigInt!
  issuer: Bytes!
  debtor: Bytes!
  faceValue: BigInt!
  originatorFee: BigInt!  # 0.5% of face value
  timestamp: BigInt!
  status: InvoiceStatus!
}

enum InvoiceStatus {
  PENDING
  VERIFIED
  FINANCED
  PAID
  DEFAULTED
  DISPUTED
}

# Routes originator fees & surplus to the DAO treasury
type ProtocolRevenue @entity {
  id: ID!            # txHash
  source: RevenueSource!
  amount: BigInt!
  token: Bytes!
  timestamp: BigInt!
}

enum RevenueSource {
  ORIGINATOR_FEE
  SOVEREIGN_SURPLUS
  SAFETY_DIVERSION
}

# Tracks Elite AGA intent activations for Negative-Gravity freelancers
type EliteIntent @entity {
  id: ID!
  freelancer: Bytes!
  gravityScore: Int!  # Negative score = Elite match lane
  intentHash: Bytes!
  timestamp: BigInt!
}
