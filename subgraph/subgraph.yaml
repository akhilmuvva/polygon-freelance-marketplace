specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: FreelanceEscrow
    network: matic
    source:
      address: "0x5Ff3E1223B5c37f1C18CC279dfC9C181bF22BEf9"
      abi: FreelanceEscrow
      startBlock: 8560000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Job
        - Milestone
      abis:
        - name: FreelanceEscrow
          file: ./abis/FreelanceEscrow.json
      eventHandlers:
        - event: JobCreated(indexed uint256,indexed address,indexed address,uint256,uint256)
          handler: handleJobCreated
        - event: JobApplied(indexed uint256,indexed address,uint256)
          handler: handleJobApplied
        - event: FreelancerPicked(indexed uint256,indexed address)
          handler: handleFreelancerPicked
        - event: JobAccepted(indexed uint256,indexed address)
          handler: handleJobAccepted
        - event: FundsReleased(indexed uint256,indexed address,uint256,uint256)
          handler: handleFundsReleased
        - event: MilestoneReleased(indexed uint256,indexed address,indexed uint256,uint256)
          handler: handleMilestoneReleased
        - event: DisputeRaised(indexed uint256,uint256)
          handler: handleDisputeRaised
        - event: Dispute(indexed address,indexed uint256,uint256,uint256)
          handler: handleDispute
        - event: Evidence(indexed address,indexed uint256,indexed address,string)
          handler: handleEvidence
        - event: Ruling(indexed address,indexed uint256,uint256)
          handler: handleRuling
        - event: ReviewSubmitted(indexed uint256,indexed address,indexed address,uint8,string)
          handler: handleReviewSubmitted
        - event: IntentMatched(indexed uint256,indexed address,indexed address,bytes32)
          handler: handleIntentMatched
      file: ./src/mapping.ts
  - kind: ethereum
    name: FreelancerReputation
    network: matic
    source:
      address: "0x6976ED34702D29e8605C4b57752a61FeAaC14eeF"
      abi: FreelancerReputation
      startBlock: 8560000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Freelancer
      abis:
        - name: FreelancerReputation
          file: ./abis/FreelancerReputation.json
      eventHandlers:
        - event: RatingUpdated(indexed address,uint8,uint256)
          handler: handleRatingUpdated
        - event: PortfolioUpdated(indexed address,string)
          handler: handlePortfolioUpdated
      file: ./src/mapping.ts
  - kind: ethereum
    name: YieldManager
    network: matic
    source:
      address: "0x84393886AcE0A9A8602CF8D96Fb1A7C25AD0b295"
      abi: YieldManager
      startBlock: 8560000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - YieldDistribution
        - ProtocolStats
      abis:
        - name: YieldManager
          file: ./abis/YieldManager.json
      eventHandlers:
        - event: YieldDistributed(indexed address,uint256)
          handler: handleYieldDistributed
        - event: YieldRebalanced(address,uint256,uint256)
          handler: handleYieldRebalanced
      file: ./src/mapping.ts
  - kind: ethereum
    name: SovereignRegistry
    network: matic
    source:
      address: "0x5Ff3E1223B5c37f1C18CC279dfC9C181bF22BEf9"
      abi: SovereignRegistry
      startBlock: 8560000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Freelancer
      abis:
        - name: SovereignRegistry
          file: ./abis/SovereignRegistry.json
      eventHandlers:
        - event: ERC6551AccountCreated(address,indexed address,bytes32,uint256,indexed address,indexed uint256)
          handler: handleAccountCreated
      file: ./src/mapping.ts
