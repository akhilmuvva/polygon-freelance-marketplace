type Freelancer @entity {
  id: ID! # address
  totalStars: BigInt!
  totalJobsReviewed: BigInt!
  averageRating: Int!
  portfolioCID: String
  jobs: [Job!]! @derivedFrom(field: "freelancerLookup")
  reviews: [Review!]! @derivedFrom(field: "freelancer")
}

type Job @entity {
  id: ID!
  jobId: BigInt!
  client: Bytes! # address
  freelancer: Bytes! # address (old field, keeping for compatibility or removing if safe)
  freelancerLookup: Freelancer # new relation
  token: Bytes! # address
  amount: BigInt!
  freelancerStake: BigInt!
  totalPaidOut: BigInt!
  status: JobStatus!
  ipfsHash: String!
  paid: Boolean!
  deadline: BigInt!
  milestoneCount: Int!
  categoryId: Int!
  rating: Int
  createdAt: BigInt!
  updatedAt: BigInt!
  transactions: [Transaction!]! @derivedFrom(field: "job")
  milestones: [Milestone!]! @derivedFrom(field: "job")
  applications: [Application!]! @derivedFrom(field: "job")
  review: Review @derivedFrom(field: "job")
}

enum JobStatus {
  Created
  Accepted
  Ongoing
  Disputed
  Arbitration
  Completed
  Cancelled
}

type Milestone @entity {
  id: ID! # jobId-milestoneId
  job: Job!
  milestoneId: BigInt!
  amount: BigInt!
  ipfsHash: String!
  isReleased: Boolean!
}

type Application @entity {
  id: ID! # jobId-freelancer
  job: Job!
  freelancer: Freelancer!
  stake: BigInt!
  createdAt: BigInt!
}

type Review @entity {
  id: ID! # jobId
  job: Job!
  reviewer: Bytes!
  freelancer: Freelancer!
  rating: Int!
  ipfsHash: String!
  createdAt: BigInt!
}

type Transaction @entity {
  id: ID! # txHash
  job: Job!
  from: Bytes!
  to: Bytes
  amount: BigInt
  event: String!
  timestamp: BigInt!
  blockNumber: BigInt!
}

type Evidence @entity {
  id: ID! # txHash
  job: Job!
  submitter: Bytes!
  evidenceHash: String!
  timestamp: BigInt!
}

type GlobalStat @entity {
  id: ID! # "1"
  totalJobs: BigInt!
  totalVolume: BigInt!
  activeUsers: [Bytes!]!
}
type DisputeMapping @entity {
  id: ID! # disputeId
  jobId: BigInt!
}
