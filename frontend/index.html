  <script>
    try {
      if (window.trustedTypes && window.trustedTypes.createPolicy) {
        window.trustedTypes.createPolicy('default', {
          createHTML: (s) => s,
          createScriptURL: (s) => s,
          createScript: (s) => s,
        });
      }
    } catch (e) { /* policy already registered or unsupported */ }
  </script>
