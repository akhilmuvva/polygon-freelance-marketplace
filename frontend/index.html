  <script>
    // Universal Polyfills for Web3 / SIWE / Biconomy
    (function() {
      const g = window;
      g.global = g;
      g.process = g.process || { 
        env: { NODE_ENV: 'production' },
        version: 'v22.0.0',
        nextTick: (fn) => setTimeout(fn, 0),
        browser: true
      };
      
      // Force exports/module to exist globally for legacy CJS interop
      if (!g.exports) g.exports = {};
      if (!g.module) g.module = { exports: g.exports };
      
      // Patch for libraries that might try to redefine 'exports' on window
      const _origDefine = Object.defineProperty;
      Object.defineProperty = function(obj, prop, desc) {
        if ((prop === 'exports' || prop === 'module') && obj === g) return;
        return _origDefine.apply(this, arguments);
      };
    })();

    // Mute noise from SES and regional script injectors
    (function () {
      const filter = (args) => {
        const msg = args.map(a => String(a)).join(' ');
        return msg.includes('SES Removing unpermitted intrinsics') || 
               msg.includes('infird.com'); 
      };
      ['log', 'info', 'warn', 'debug', 'error'].forEach(method => {
        const _orig = console[method];
        console[method] = function (...args) {
          if (!filter(args)) _orig.apply(console, args);
        };
      });
    })();
  </script>
