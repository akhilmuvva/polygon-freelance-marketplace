<!doctype html>
<html lang="en">

<head>
  <script>
    // Polyfill for Web3 / Biconomy dependencies
    window.global = window;
    window.process = { env: {} };

    // Absolute pre-emption of SES/library noise
    (function () {
      const filter = (args) => {
        const msg = args.map(a => String(a)).join(' ');
        return msg.includes('SES Removing unpermitted intrinsics');
      };
      ['log', 'info', 'warn', 'debug', 'error'].forEach(method => {
        const _orig = console[method];
        console[method] = function (...args) {
          if (!filter(args)) _orig.apply(console, args);
        };
      });
    })();
  </script>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <link rel="manifest" href="/manifest.json" />
  <!-- CSP should be set via HTTP headers in production, not here -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#8b5cf6" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>PolyLance | Zenith</title>
</head>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
